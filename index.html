<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CCPC 부서별 보고서 관리 시스템</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>

body{
font-family:'Noto Sans KR',sans-serif;
background:#f8fafc;
}

.loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
background:rgba(255,255,255,0.8);
z-index:9999;
}

.auto-list{
counter-reset:item;
list-style:none;
padding-left:0;
}

.auto-list li{
display:flex;
margin-bottom:6px;
}

.auto-list li::before{
content:counter(item) ". ";
counter-increment:item;
font-weight:bold;
margin-right:8px;
color:#6366f1;
}

</style>
</head>

<body>

<div id="loading" class="loading">
<i class="fas fa-spinner fa-spin text-3xl text-indigo-600"></i>
</div>

<nav class="bg-indigo-600 text-white p-3 flex justify-between">

<h1 class="font-bold">CCPC 부서 보고 시스템</h1>

<div>

<button onclick="resetView()">초기화</button>

<button onclick="openCreateForm()">새 보고서</button>

</div>

</nav>

<main class="max-w-5xl mx-auto p-6">

<div class="grid grid-cols-3 gap-4 mb-6">

<div class="bg-white p-4 rounded shadow">
<p>전체 보고서</p>
<h2 id="total-count">0</h2>
</div>

<div class="bg-white p-4 rounded shadow">
<p>이번 달</p>
<h2 id="month-count">0</h2>
</div>

<div class="bg-white p-4 rounded shadow">
<p>활성 부서</p>
<div id="active-depts"></div>
</div>

</div>

<section id="section-form" style="display:none">

<form id="report-form">

<input type="hidden" id="edit-id">

<select id="dept">

<option>목회실</option>
<option>총무부</option>
<option>교우부</option>
<option>새가족부</option>
<option>장학부</option>
<option>예배부</option>
<option>방송부</option>
<option>찬양부</option>
<option>청년부</option>

</select>

<input id="writer" placeholder="작성자">

<input type="date" id="date">

<textarea id="activity" placeholder="활동"></textarea>

<textarea id="plans" placeholder="계획"></textarea>

<textarea id="prayer" placeholder="건의"></textarea>

<button type="submit">저장</button>

</form>

</section>

<section id="section-list">

<input id="search" placeholder="부서 검색">

<button onclick="executeSearch()">조회</button>

<div id="report-detail-container"></div>

</section>

</main>

<div id="toast"></div>

<script>

const GAS_WEB_APP_URL =
"https://script.google.com/macros/s/AKfycbyRS48HPTCPgDRE3N563YE4SA2OZKNHzHlzEpIYKD2OzrjInuJ0tZn47nf-_db71HYe6Q/exec";

let allReports=[];

window.onload=()=>{

loadReports();

document.getElementById("date").value=
new Date().toISOString().split("T")[0];

};

function toggleLoading(v){

document.getElementById("loading").style.display=
v?"flex":"none";

}

async function loadReports(){

toggleLoading(true);

const res=await fetch(`${GAS_WEB_APP_URL}?action=getReports`);

const data=await res.json();

allReports=data||[];

updateDashboard();

toggleLoading(false);

}

function updateDashboard(){

document.getElementById("total-count").innerText=
allReports.length;

const now=new Date();

const prefix=
`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;

const month=
allReports.filter(r=>r.date.startsWith(prefix));

document.getElementById("month-count").innerText=
month.length;

}

function executeSearch(){

const term=document
.getElementById("search")
.value
.toLowerCase();

const filtered=
allReports.filter(r=>
r.dept.includes(term)
);

displaySearchList(filtered);

}

function displaySearchList(list){

const box=document.getElementById("report-detail-container");

box.innerHTML="";

list.forEach(r=>{

const div=document.createElement("div");

div.className="bg-white p-4 rounded shadow mb-3";

div.innerHTML=`

<h3>${r.date} ${r.dept}</h3>

<p>작성자 : ${r.writer}</p>

<button onclick="deleteReport('${r.id}')">삭제</button>

`;

box.appendChild(div);

});

}

async function deleteReport(id){

if(!confirm("삭제하시겠습니까?"))return;

toggleLoading(true);

await fetch(GAS_WEB_APP_URL,{

method:"POST",

mode:"no-cors",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({

action:"delete",

id:id

})

});

setTimeout(()=>{

location.reload();

},2000);

}

function openCreateForm(){

document.getElementById("section-form").style.display="block";

}

document
.getElementById("report-form")
.addEventListener("submit",async e=>{

e.preventDefault();

toggleLoading(true);

const data={

id:"ID_"+Date.now(),

dept:document.getElementById("dept").value,

writer:document.getElementById("writer").value,

date:document.getElementById("date").value,

activity:document.getElementById("activity").value,

plans:document.getElementById("plans").value,

prayer:document.getElementById("prayer").value

};

await fetch(GAS_WEB_APP_URL,{

method:"POST",

mode:"no-cors",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({

action:"save",

...data

})

});

setTimeout(()=>{

location.reload();

},2000);

});

function resetView(){

location.reload();

}

</script>

</body>
</html>
